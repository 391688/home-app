<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマホ使用管理レポート</title>

<meta name="theme-color" content="#2b2b2b">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
/* 全要素の幅計算を「枠線込み」に固定してハミ出しを防止 */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background: #2b2b2b;
  color: #f0f0f0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  /* 左右の余計なスクロール（ガタつき）を防止 */
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

.report {
  /* iPhoneの画面幅いっぱいに広がりつつ、最大幅を制限 */
  width: 100%;
  max-width: 480px; 
  margin: 0 auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 1.2rem;
  margin-bottom: 24px;
}

.block {
  margin-bottom: 20px;
  width: 100%;
}

.label {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 6px;
}

.value {
  font-size: 16px;
  word-wrap: break-word;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

.money {
  font-size: 24px;
  color: #ffb3b3;
}

/* 入力欄が画面幅を超えないように調整 */
input {
  width: 100%;
  padding: 12px; /* 少し大きくしてタップしやすく */
  font-size: 16px; /* iPhoneでズームされるのを防ぐサイズ */
  border-radius: 8px;
  border: none;
  background: #3a3a3a;
  color: #fff;
  appearance: none; /* iOS特有のスタイルをリセット */
  -webkit-appearance: none;
}

input[type="date"] {
  margin-bottom: 8px;
}

/* フォームのフォントサイズが16px未満だとSafariで自動ズームされるため、16pxを維持 */
</style>
</head>

<body>
<div class="report">
  <h1>スマホ使用管理レポート</h1>

  <div class="block">
    <div class="label">期間</div>
    <input type="date" id="start">
    <input type="date" id="end">
    <div class="value" id="periodText" style="margin-top:8px;">未設定</div>
  </div>

  <div class="block">
    <div class="label">使用時間（分）</div>
    <input type="number" id="minutes" placeholder="例：760">
  </div>

  <div class="block">
    <div class="label">金額換算（1分＝1円）</div>
    <div class="value money" id="money">−0円</div>
  </div>
</div>

<script>
const start = document.getElementById("start");
const end = document.getElementById("end");
const periodText = document.getElementById("periodText");
const minutesInput = document.getElementById("minutes");
const moneyDisplay = document.getElementById("money");

function update() {
  // 期間の表示更新
  if (start.value && end.value) {
    const s = new Date(start.value);
    const e = new Date(end.value);
    periodText.innerText = `${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
  }

  // 金額の計算（1分=1円のマイナス計算と想定）
  const mins = parseInt(minutesInput.value) || 0;
  moneyDisplay.innerText = `−${mins.toLocaleString()}円`;
}

start.addEventListener("change", update);
end.addEventListener("change", update);
minutesInput.addEventListener("input", update);
</script>
</body>
</html>
